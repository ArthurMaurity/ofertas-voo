name: Monitor de ofertas de voo

on:
  schedule:
    # GitHub Actions usa horário UTC. Brasília = UTC-3.
    # 08:00 BRT = 11:00 UTC  |  18:00 BRT = 21:00 UTC
    - cron: "0 11 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow"

# Necessário para o workflow conseguir commitar o banco/JSON atualizados.
permissions:
  contents: write

# Evita duas execuções simultâneas mexendo no banco ao mesmo tempo.
concurrency:
  group: monitor-voo
  cancel-in-progress: false

jobs:
  rodar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar monitor (coleta + exporta JSON)
        working-directory: motor
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          DESTINATARIOS_WHATS: ${{ secrets.DESTINATARIOS_WHATS }}
        run: python main.py

      - name: Salvar histórico e dados do frontend (commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add motor/precos.db motor/iata_cache.json data/deals.json data/history.json
          if git diff --staged --quiet; then
            echo "Nada mudou no histórico."
          else
            git commit -m "Atualiza histórico de preços e dados do site [skip ci]"
            git push
          fi
