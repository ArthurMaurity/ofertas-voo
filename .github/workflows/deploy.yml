name: Deploy do site (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

# Permissões exigidas pelo GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; cancela builds antigos pendentes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Copiar dados para o build
        run: |
          mkdir -p frontend/public/data
          cp data/deals.json data/history.json frontend/public/data/

      - name: Build
        working-directory: frontend
        env:
          # Token PÚBLICO do Mapbox (pk....). Cadastre em
          # Settings > Secrets and variables > Actions > New repository secret.
          VITE_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          # Base path = /<nome-do-repo>/ para o GitHub Pages de projeto.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
